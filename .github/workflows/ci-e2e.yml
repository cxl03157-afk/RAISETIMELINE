name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'backend/src/**'
      - 'e2e/**'
      - '.github/workflows/ci-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'backend/src/**'
      - 'e2e/**'
      - '.github/workflows/ci-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: raisetimeline
          POSTGRES_USER: raisetimeline
          POSTGRES_PASSWORD: raisetimeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U raisetimeline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make Gradle wrapper executable
        run: chmod +x backend/gradlew

      - name: Install PostgreSQL client (psql コマンド用)
        run: sudo apt-get install -y postgresql-client

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Start backend
        run: ./gradlew bootRun &
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/raisetimeline
          SPRING_DATASOURCE_USERNAME: raisetimeline
          SPRING_DATASOURCE_PASSWORD: raisetimeline
          JWT_SECRET: e2e-test-secret-key-must-be-at-least-32-chars-long
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION: ap-northeast-1
          AWS_S3_BUCKET: dummy-bucket

      - name: Start frontend dev server
        run: npm run dev &
        working-directory: frontend

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/v3/api-docs > /dev/null 2>&1; then
              echo "Backend ready (attempt ${i})"
              exit 0
            fi
            echo "  attempt ${i}/60 - not ready yet, waiting 3s..."
            sleep 3
          done
          echo "Backend failed to start within 180s"
          exit 1

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend ready (attempt ${i})"
              exit 0
            fi
            echo "  attempt ${i}/30 - not ready yet, waiting 2s..."
            sleep 2
          done
          echo "Frontend failed to start within 60s"
          exit 1

      - name: Run E2E tests
        run: npx playwright test scenarios/ accessibility/ --project=chromium
        working-directory: e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
