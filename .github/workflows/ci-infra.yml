name: CI - Infrastructure

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/ci-infra.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: Terraform Init (no backend)
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/terraform

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/terraform
          exit-code: '1'
          severity: HIGH,CRITICAL
          trivyignores: infra/terraform/.trivyignore

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [lint-validate, security-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=ap-northeast-1" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"
        working-directory: infra/terraform

      - name: Terraform Plan
        run: terraform plan -no-color 2>&1 | tee plan_output.txt; exit ${PIPESTATUS[0]}
        working-directory: infra/terraform
        env:
          TF_VAR_allowed_ipv4: ${{ secrets.TF_VAR_ALLOWED_IPV4 }}
          TF_VAR_allowed_ipv6: ${{ secrets.TF_VAR_ALLOWED_IPV6 }}

      - name: Post Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const body = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n...(truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan\n\`\`\`\n${body}\n\`\`\``
            });
