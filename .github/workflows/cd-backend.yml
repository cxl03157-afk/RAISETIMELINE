name: CD - Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/cd-backend.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/raisetimeline-backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/raisetimeline-backend:latest \
            backend/
          docker push $ECR_REGISTRY/raisetimeline-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/raisetimeline-backend:latest
          echo "image=$ECR_REGISTRY/raisetimeline-backend:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download Current Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition raisetimeline-backend \
            --query taskDefinition \
            > task-definition.json

      - name: Render New Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: raisetimeline-backend
          cluster: raisetimeline
