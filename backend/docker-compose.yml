services:
  postgres:
    image: postgres:17-alpine
    container_name: raisetimeline-db
    environment:
      POSTGRES_DB: raisetimeline
      POSTGRES_USER: raisetimeline
      POSTGRES_PASSWORD: raisetimeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
