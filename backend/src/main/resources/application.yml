spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/raisetimeline
    username: raisetimeline
    password: raisetimeline
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:raisetimeline-local-dev-secret-key-must-be-at-least-32-chars}
    expiration-ms: 900000    # 15 minutes
  refresh-token:
    expiration-days: 7
