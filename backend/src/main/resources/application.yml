spring:
  application:
    name: raisetimeline
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 42MB
  datasource:
    url: jdbc:postgresql://localhost:5432/raisetimeline
    username: raisetimeline
    password: raisetimeline
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET:raisetimeline-local-dev-secret-key-must-be-at-least-32-chars}
    expiration-ms: 900000    # 15 minutes
  refresh-token:
    expiration-days: 7

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:raisetimeline-images-865091756032}
    region: ap-northeast-1
    presigned-url-expiry-minutes: 60

logging:
  level:
    root: INFO
    com.raisetimeline: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.springframework.security: WARN
    software.amazon.awssdk: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: true
