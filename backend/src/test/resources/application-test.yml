spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long
    expiration-ms: 900000
  refresh-token:
    expiration-days: 7

aws:
  s3:
    bucket: test-bucket
    region: ap-northeast-1
    presigned-url-expiry-minutes: 60
